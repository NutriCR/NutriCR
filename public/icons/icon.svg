<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </radialGradient>
  </defs>

  <!-- Fondo verde oscuro con leve degradado -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>

  <!--
    ─────────────────────────────────────────────────────────────
    Zona segura con 20 % de padding: x/y 102 → 410 (308 × 308 px)
    Aro: r=142 → borde exterior en 256±142 = 114…398 ✓
    ─────────────────────────────────────────────────────────────
  -->

  <!-- Aro circular -->
  <circle cx="256" cy="256" r="142"
          fill="none"
          stroke="#76C442"
          stroke-width="22"/>

  <!-- ══════════════════════════════════════════════
       TENEDOR  —  cuadrante superior derecho
       stroke-width=22 para legibilidad a 72 px
  ══════════════════════════════════════════════ -->
  <g stroke="#76C442" stroke-linecap="round" stroke-linejoin="round"
     fill="none" stroke-width="22">

    <!-- Diente izquierdo -->
    <line x1="277" y1="152" x2="277" y2="220"/>
    <!-- Diente central -->
    <line x1="297" y1="146" x2="297" y2="220"/>
    <!-- Diente derecho -->
    <line x1="317" y1="152" x2="317" y2="220"/>

    <!-- Puente que une los dientes con el mango -->
    <path d="M277,220 Q277,244 297,246 Q317,244 317,220"/>

    <!-- Mango -->
    <line x1="297" y1="246" x2="297" y2="328"/>
  </g>

  <!-- ══════════════════════════════════════════════
       HOJA  —  mitad inferior, centrada
       Rellena al 30 % para legibilidad en tamaños pequeños
  ══════════════════════════════════════════════ -->

  <!-- Silueta de la hoja (relleno sutil) -->
  <path d="M 208,364
           C 184,302 202,256 256,238
           C 310,256 328,302 304,364
           C 276,375 236,375 208,364 Z"
        fill="#76C442" fill-opacity="0.30"
        stroke="#76C442" stroke-width="22"
        stroke-linejoin="round"/>

  <!-- Nervio central -->
  <line x1="256" y1="238" x2="256" y2="364"
        stroke="#76C442" stroke-width="16" stroke-linecap="round"/>

  <!-- Tallo -->
  <line x1="256" y1="364" x2="256" y2="393"
        stroke="#76C442" stroke-width="22" stroke-linecap="round"/>
</svg>
